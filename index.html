<!DOCTYPE html>
<html>
<head>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head>
<body>
  <pre id="result">chargement...</pre>
  <script>
    grist.ready();

    grist.docApi.getAccessToken({readOnly: true}).then(token => {
      const url = token.baseUrl + '/access?auth=' + token.token;
      return fetch(url);
    }).then(r => r.json()).then(data => {
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    }).catch(err => {
      document.getElementById('result').textContent = 'erreur: ' + err;
    });
  </script>
</body>
</html>
