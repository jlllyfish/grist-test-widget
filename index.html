<!DOCTYPE html>
<html>
<head>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head>
<body>
  <pre id="result">chargement...</pre>
  <script>
    grist.ready();

    grist.onRecord((record, mappings) => {
      document.getElementById('result').textContent = JSON.stringify({record, mappings}, null, 2);
    });
  </script>
</body>
</html>
